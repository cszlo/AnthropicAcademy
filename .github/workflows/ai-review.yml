name: AI Code Review

on:
  pull_request:
    types: [ready_for_review]
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: clayszlosek/AnthropicAcademy/AiFluency@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
